name: Build Plugins

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libx11-xcb-dev libx11-dev libxcursor-dev libasound2-dev libgl-dev libjack-jackd2-dev libwayland-dev

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-nih-plug
        run: cargo install --force --git https://github.com/xxx/nih-plug.git --branch finish-vst3-pr cargo-nih-plug

      - name: Build wavetable-filter
        run: cargo nih-plug bundle wavetable-filter --release

      - name: Build gs-meter
        run: cargo nih-plug bundle gs-meter --release

      - name: Build gain-brain
        run: cargo nih-plug bundle gain-brain --release

      - name: Build tinylimit
        run: cargo nih-plug bundle tinylimit --release

      - name: Build satch
        run: cargo nih-plug bundle satch --release

      - name: Build pope-scope
        run: cargo nih-plug bundle pope-scope --release

      - name: Build six-pack
        run: cargo nih-plug bundle six-pack --release

      - name: Build warp-zone
        run: cargo nih-plug bundle warp-zone --release

      - name: Build imagine
        run: cargo nih-plug bundle imagine --release

      - name: Build standalones
        run: |
          cargo build --bin wavetable-filter --release
          cargo build --bin gs-meter --release
          cargo build --bin gain-brain --release
          cargo build --bin tinylimit --release
          cargo build --bin satch --release
          cargo build --bin pope-scope --release
          cargo build --bin six-pack --release
          cargo build --bin warp-zone --release
          cargo build --bin imagine --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.name }}
          path: |
            target/bundled/*.clap
            target/bundled/*.vst3
